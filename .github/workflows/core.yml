name: Core

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Format
        run: cargo fmt --all -- --check
      - name: Lint
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace --all-targets
      - name: Build release
        run: cargo build --workspace --release
      - name: End to end smoke
        run: |
          QUANTA_DATA_DIR="$RUNNER_TEMP/quantadb-smoke" ./target/release/quantadb-server &
          server_pid=$!
          sleep 2
          ./target/release/loadgen --seconds 3 --connections 4 --rows 2000
          psql "host=127.0.0.1 port=55432 user=quanta dbname=quanta" \
            -v ON_ERROR_STOP=1 \
            -c "CREATE TABLE smoke (id BIGINT PRIMARY KEY, note TEXT NOT NULL)" \
            -c "INSERT INTO smoke (id, note) VALUES (1, 'hello from psql')" \
            -c "SELECT id, note FROM smoke ORDER BY id" \
            -c "BEGIN" -c "ROLLBACK"
          kill "$server_pid"
