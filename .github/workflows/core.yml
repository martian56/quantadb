name: Core

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Format
        run: cargo fmt --all -- --check
      - name: Lint
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace --all-targets
      - name: Build release
        run: cargo build --workspace --release
      - name: End to end smoke
        run: |
          QUANTA_DATA_DIR="$RUNNER_TEMP/quantadb-smoke" ./target/release/quantadb-server &
          server_pid=$!
          sleep 2
          ./target/release/loadgen --seconds 3 --connections 4 --rows 2000
          kill "$server_pid"
